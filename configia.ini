'configia.ini - Configuracion de Inteligencia Artificial de NPCs
'Parametros en esta seccion tienen precedencia sobre Configuracion.ini y Server.ini.

[IA]

'--- VISION Y DETECCION ---

'Rango de vision global en columnas (eje X). Default: 15
RangoVisionX=8

'Rango de vision global en filas (eje Y). Default: 13
RangoVisionY=7

'Rango maximo absoluto que puede alcanzar un NPC al expandir pathfinding.
RangoVisionMaximo=100

'Tiles extra de rango que un NPC sigue persiguiendo antes de soltar al target.
'No afecta la deteccion inicial, solo cuanto aguanta la persecucion.
DesistirExtra=5

'--- HECHIZOS ---

'Distancia maxima en X para que un NPC lance un hechizo.
RangoHechizosX=11

'Distancia maxima en Y para que un NPC lance un hechizo.
RangoHechizosY=9

'--- PATHFINDING ---

'Maximo de pasos del algoritmo A* por calculo (max absoluto: 512).
MaxPasosPathfinding=500

'Ruido aleatorio del pathfinding (0.0 a 1.0). 0=camino optimo, 1=muy aleatorio.
RuidoPathfinding=0.75

'Tiempo minimo en ms entre recalculos de camino.
CooldownRecalculoCamino=250

'--- ORBITA Y STRAFE (NPCs de rango) ---

'Cada cuantos ms el NPC decide si cambia direccion de orbita.
IntervaloReevaluarOrbita=1800

'Peso del movimiento lateral en la orbita (0.0=solo alejarse, 1.0=solo lateral).
PesoTangencialOrbita=0.35

'Margen en tiles antes de que el NPC empiece a retroceder del target.
BufferDistanciaRetirada=0.75

'Angulo en grados que avanza el NPC por paso de orbita.
PasoGradosOrbita=55

'Duracion en ms del strafe antes de reevaluar.
DuracionStrafe=900

'--- DEAMBULACION (sin target) ---

'Radio maximo en tiles que puede alejarse un NPC de su origen antes de volver.
RadioDeambulacion=4

'El NPC tira un dado 1-ProbabilidadMovimientoDivisor; si sale ProbabilidadMovimientoValor se mueve.
'Con los valores default: 1 en 6 chances de moverse por tick (~16.7%).
ProbabilidadMovimientoDivisor=6
ProbabilidadMovimientoValor=3

'--- GUARDIAS ---

'Diametro en tiles del area de vigilancia de guardias NPC.
'Radio efectivo = DiametroVisionGuardias / 2.
DiametroVisionGuardias=7
